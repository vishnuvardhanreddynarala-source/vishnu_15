<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Vishnu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9933, #ffcc66);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            color: #d35400;
            font-size: 3em;
            margin-bottom: 10px;
        }

        h2 {
            color: #444;
            font-weight: normal;
        }

        p {
            color: #666;
            font-size: 1.2em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .flower {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flower">🌸🌺🌸</div>
        <h1>Welcome, Vishnu!</h1>
        <h2>Invitation Program</h2>
        <p>We are delighted to have you with us.</p>
        <p>Your presence makes this occasion even more special.</p>
        <div class="flower">🌸🌺🌸</div>
    </div>
</body>
</html>
